<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Schedule - WraptorGuard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    .logo-green { color: #00A651; }
    body { font-family: system-ui, sans-serif; }
    .calendar-day {
      transition: all 0.2s ease;
    }
    .calendar-day:hover {
      background-color: #27272a;
      transform: translateY(-2px);
    }
    .calendar-day.has-jobs {
      background-color: #052e16;
      border: 2px solid #00A651;
    }
    .calendar-day.today {
      border: 2px solid #eab308;
    }
    .job-card {
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .job-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
    }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <!-- Navbar -->
  <nav class="bg-black border-b border-green-600 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <img src="images/logo2.png" alt="WraptorGuard Logo" class="h-16 w-auto md:h-24">
          <div>
            <span class="text-2xl md:text-3xl font-black tracking-tighter logo-green">WRAPTOR</span>
            <span class="text-2xl md:text-3xl font-black tracking-tighter">GUARD</span>
          </div>
        </div>

        <div class="hidden md:flex gap-8 text-lg">
          <a href="staff-dashboard.html" class="hover:text-green-400 transition">Dashboard</a>
          <a href="job-calculator.html" class="hover:text-green-400 transition">Calculator</a>
          <a href="saved-quotes.html" class="hover:text-green-400 transition">Estimates</a>
          <a href="job-schedule.html" class="hover:text-green-400 transition">Calendar</a>
          <a href="pricing-settings.html" class="hover:text-green-400 transition">Pricing</a>


        </div>

        <button id="logout-btn" class="hidden md:block bg-red-600 hover:bg-red-500 px-6 py-3 rounded-2xl font-semibold transition">
          Logout
        </button>

        <button id="mobile-menu-button" class="md:hidden hamburger flex flex-col justify-center gap-1.5 w-10 h-10">
          <span class="block h-0.5 w-8 bg-white"></span>
          <span class="block h-0.5 w-8 bg-white"></span>
          <span class="block h-0.5 w-8 bg-white"></span>
        </button>
      </div>

      <div id="mobile-menu" class="hidden md:hidden mt-4 py-6 border-t border-green-900">
        <div class="flex flex-col gap-6 text-xl">
          <a href="staff-dashboard.html" class="hover:text-green-400 transition py-2">Dashboard</a>
          <a href="job-calculator.html" class="hover:text-green-400 transition py-2">Job Calculator</a>
          <a href="saved-quotes.html" class="hover:text-green-400 transition py-2">Estimates</a>
          <a href="job-schedule.html" class="hover:text-green-400 transition py-2">Calendar</a>
          <a href="pricing-settings.html" class="hover:text-green-400 transition py-2">Pricing</a>
          <button id="mobile-logout-btn" class="mt-6 bg-red-600 hover:bg-red-500 py-4 rounded-2xl font-semibold text-center">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8 sm:py-12">
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-8 gap-4">
      <h1 class="text-4xl sm:text-5xl font-bold">Job Schedule</h1>
      
      <div class="flex items-center gap-4">
        <div class="bg-zinc-900 rounded-3xl p-1 flex">
          <button id="monthly-btn" class="view-btn px-6 py-2 rounded-3xl text-sm font-medium">Monthly</button>
          <button id="weekly-btn" class="view-btn active px-6 py-2 rounded-3xl text-sm font-medium">Weekly</button>
        </div>

        <button id="prev-btn" class="px-5 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">←</button>
        <div id="current-period" class="text-xl font-semibold px-8 py-3 bg-zinc-900 rounded-3xl min-w-[260px] text-center"></div>
        <button id="next-btn" class="px-5 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">→</button>
      </div>
    </div>

    <!-- Calendar -->
    <div id="calendar-container" class="bg-zinc-900 rounded-3xl p-6">
      <div id="calendar-grid" class="grid grid-cols-7 gap-3"></div>
    </div>

    <!-- Selected Day Jobs -->
    <div class="mt-12">
      <h2 class="text-2xl font-semibold mb-6" id="selected-date-title">Select a date to view scheduled jobs</h2>
      <div id="daily-jobs" class="space-y-4"></div>
    </div>
  </div>

  <!-- Edit Job Modal -->
  <div id="edit-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-3xl mx-4 max-h-[90vh] overflow-y-auto">
      <h2 class="text-2xl font-bold mb-6">Edit Job Quote</h2>
      
      <div class="space-y-6">
        <div>
          <label class="block text-sm text-zinc-400 mb-2">Customer Name</label>
          <input id="edit_customer_name" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm text-zinc-400 mb-2">Status</label>
            <select id="edit_status" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
              <option value="not_started">Not Started</option>
              <option value="in_progress">In Progress</option>
              <option value="completed">Completed</option>
            </select>
          </div>
          <div>
            <label class="block text-sm text-zinc-400 mb-2">Total Cost ($)</label>
            <input id="edit_total_cost" type="number" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
          </div>
        </div>

        <div id="scheduled-date-group" class="hidden">
          <label class="block text-sm text-zinc-400 mb-2">Scheduled Date & Time</label>
          <input id="edit_scheduled_date" type="datetime-local" 
                 class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
        </div>

        <div>
          <label class="block text-sm text-zinc-400 mb-2">Notes</label>
          <textarea id="edit_notes" rows="3" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4"></textarea>
        </div>

        <div>
          <label class="block text-sm text-zinc-400 mb-3">Upload New Photos</label>
          <input id="photo-upload" type="file" multiple accept="image/*" 
                 class="block w-full text-sm text-zinc-400 file:mr-4 file:py-3 file:px-6 file:rounded-2xl file:border-0 file:bg-green-600 file:text-black file:font-medium hover:file:bg-green-500">
        </div>

        <div>
          <label class="block text-sm text-zinc-400 mb-3">Photos</label>
          <div id="photo-preview" class="photo-grid grid grid-cols-2 sm:grid-cols-3 gap-4"></div>
        </div>
      </div>

      <div class="flex gap-4 mt-10">
        <button id="cancel-edit-btn" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl font-semibold">Cancel</button>
        <button id="save-edit-btn" class="flex-1 py-4 bg-green-600 hover:bg-green-500 text-black rounded-2xl font-semibold">Save Changes</button>
      </div>
    </div>
  </div>

  <script>
    const supabaseClient = supabase.createClient(
      'https://jxnvndwfvphipttjbggk.supabase.co',
      'sb_publishable_3jrvCcwVtu0aAlXuOBZDLQ_3Dr4eUs4'
    );

    let currentDate = new Date();
    let currentView = 'weekly';
    let currentEditingJobId = null;
    let uploadedFiles = [];

    // Mobile Menu
    const menuButton = document.getElementById('mobile-menu-button');
    const mobileMenu = document.getElementById('mobile-menu');
    if (menuButton && mobileMenu) {
      menuButton.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));
      document.querySelectorAll('#mobile-menu a').forEach(link => link.addEventListener('click', () => mobileMenu.classList.add('hidden')));
    }

    // View Toggle
    document.getElementById('monthly-btn').addEventListener('click', () => {
      currentView = 'monthly';
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('monthly-btn').classList.add('active');
      loadSchedule();
    });

    document.getElementById('weekly-btn').addEventListener('click', () => {
      currentView = 'weekly';
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('weekly-btn').classList.add('active');
      loadSchedule();
    });

    async function loadSchedule() {
      const { data: jobs } = await supabaseClient
        .from('job_calculations')
        .select('*')
        .eq('status', 'in_progress')
        .not('scheduled_date', 'is', null)
        .order('scheduled_date', { ascending: true });

      if (currentView === 'monthly') {
        renderMonthlyCalendar(jobs || []);
      } else {
        renderWeeklyView(jobs || []);
      }
    }

    function renderWeeklyView(jobs) {
      const grid = document.getElementById('calendar-grid');
      grid.innerHTML = '';
      grid.className = 'grid grid-cols-7 gap-3';

      const startOfWeek = new Date(currentDate);
      startOfWeek.setDate(currentDate.getDate() - currentDate.getDay());

      const endOfWeek = new Date(startOfWeek);
      endOfWeek.setDate(startOfWeek.getDate() + 6);

      document.getElementById('current-period').textContent = 
        `${startOfWeek.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} – ${endOfWeek.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;

      for (let i = 0; i < 7; i++) {
        const dayDate = new Date(startOfWeek);
        dayDate.setDate(startOfWeek.getDate() + i);
        const dateStr = dayDate.toISOString().split('T')[0];

        const dayJobs = jobs.filter(j => {
          if (!j.scheduled_date) return false;
          return new Date(j.scheduled_date).toISOString().split('T')[0] === dateStr;
        });

        const isToday = dayDate.toDateString() === new Date().toDateString();

        grid.innerHTML += `
          <div onclick="selectDate('${dateStr}')" 
               class="calendar-day bg-zinc-900 rounded-3xl p-4 cursor-pointer min-h-[180px] ${isToday ? 'today' : ''} ${dayJobs.length > 0 ? 'has-jobs' : ''}">
            <div class="text-center mb-1 text-xs text-zinc-400">
              ${dayDate.toLocaleDateString('en-US', { weekday: 'short' })}
            </div>
            <div class="text-center font-bold text-3xl mb-4 ${isToday ? 'text-yellow-400' : ''}">
              ${dayDate.getDate()}
            </div>
            ${dayJobs.length > 0 ? `
              <div class="text-center text-xs bg-green-900/80 text-green-400 px-3 py-1 rounded-2xl inline-block">
                ${dayJobs.length} job${dayJobs.length > 1 ? 's' : ''}
              </div>` : ''}
          </div>`;
      }
    }

    function renderMonthlyCalendar(jobs) {
      const grid = document.getElementById('calendar-grid');
      grid.innerHTML = '';
      grid.className = 'grid grid-cols-7 gap-3';

      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      document.getElementById('current-period').textContent = 
        currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });

      ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(day => {
        grid.innerHTML += `<div class="text-center text-zinc-400 py-2 font-medium">${day}</div>`;
      });

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      for (let i = 0; i < firstDay; i++) {
        grid.innerHTML += `<div class="h-32 bg-zinc-900/30 rounded-3xl"></div>`;
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const dayJobs = jobs.filter(j => {
          if (!j.scheduled_date) return false;
          return new Date(j.scheduled_date).toISOString().split('T')[0] === dateStr;
        });

        const isToday = day === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear();

        grid.innerHTML += `
          <div onclick="selectDate('${dateStr}')" 
               class="calendar-day h-32 bg-zinc-900 rounded-3xl p-4 cursor-pointer ${isToday ? 'today' : ''} ${dayJobs.length > 0 ? 'has-jobs' : ''}">
            <div class="text-right font-bold text-lg ${isToday ? 'text-yellow-400' : ''}">${day}</div>
            ${dayJobs.length > 0 ? `
              <div class="mt-3 text-xs bg-green-900/80 text-green-400 px-3 py-1 rounded-2xl inline-block">
                ${dayJobs.length} job${dayJobs.length > 1 ? 's' : ''}
              </div>` : ''}
          </div>`;
      }
    }

    window.selectDate = async function(dateStr) {
      document.getElementById('selected-date-title').textContent = 
        `Scheduled Jobs on ${new Date(dateStr).toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' })}`;

      const { data: jobs } = await supabaseClient
        .from('job_calculations')
        .select('*')
        .eq('status', 'in_progress')
        .gte('scheduled_date', dateStr + 'T00:00:00Z')
        .lte('scheduled_date', dateStr + 'T23:59:59Z')
        .order('scheduled_date');

      const container = document.getElementById('daily-jobs');
      container.innerHTML = '';

      if (!jobs || jobs.length === 0) {
        container.innerHTML = `<p class="text-zinc-400 py-12 text-center">No jobs scheduled for this day.</p>`;
        return;
      }

      let html = '';
      jobs.forEach(job => {
        const time = new Date(job.scheduled_date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        html += `
          <div onclick="editJob('${job.id}')" class="job-card bg-zinc-800 rounded-3xl p-6">
            <div class="flex justify-between items-start">
              <div>
                <div class="font-semibold">${job.customer_name || 'No Name'}</div>
                <div class="text-sm text-zinc-400">${job.equipment_type || ''}</div>
              </div>
              <div class="text-right">
                <div class="text-green-400 font-bold text-xl">$${job.total_cost || 0}</div>
                <div class="text-xs text-zinc-400 mt-1">${time}</div>
              </div>
            </div>
          </div>`;
      });

      container.innerHTML = html;
    };

    // Navigation Arrows - FIXED
    document.getElementById('prev-btn').addEventListener('click', () => {
      if (currentView === 'monthly') {
        currentDate.setMonth(currentDate.getMonth() - 1);
      } else {
        currentDate.setDate(currentDate.getDate() - 7);
      }
      loadSchedule();
    });

    document.getElementById('next-btn').addEventListener('click', () => {
      if (currentView === 'monthly') {
        currentDate.setMonth(currentDate.getMonth() + 1);
      } else {
        currentDate.setDate(currentDate.getDate() + 7);
      }
      loadSchedule();
    });

    // Edit Modal Functions (same as saved-quotes)
    window.editJob = async (jobId) => {
      currentEditingJobId = jobId;
      uploadedFiles = [];

      const { data: job } = await supabaseClient
        .from('job_calculations')
        .select('*')
        .eq('id', jobId)
        .single();

      if (!job) return;

      document.getElementById('edit_customer_name').value = job.customer_name || '';
      document.getElementById('edit_status').value = job.status || 'not_started';
      document.getElementById('edit_total_cost').value = job.total_cost || '';
      document.getElementById('edit_notes').value = job.notes || '';

      const scheduledGroup = document.getElementById('scheduled-date-group');
      const scheduledInput = document.getElementById('edit_scheduled_date');
      scheduledGroup.classList.toggle('hidden', job.status !== 'in_progress');
      scheduledInput.value = job.scheduled_date ? new Date(job.scheduled_date).toISOString().slice(0,16) : '';

      const preview = document.getElementById('photo-preview');
      preview.innerHTML = '';

      try {
        const { data: files } = await supabaseClient.storage.from('job-photos').list(`${jobId}/`);
        if (files && files.length > 0) {
          for (const file of files) {
            const url = supabaseClient.storage.from('job-photos').getPublicUrl(`${jobId}/${file.name}`).data.publicUrl;
            const div = document.createElement('div');
            div.className = "relative rounded-2xl overflow-hidden cursor-pointer";
            div.innerHTML = `<img src="${url}" class="w-full h-32 object-cover">`;
            div.addEventListener('click', () => showFullSizePhoto(url));
            preview.appendChild(div);
          }
        } else {
          preview.innerHTML = `<p class="text-zinc-500 text-center py-8">No photos uploaded yet</p>`;
        }
      } catch (e) {
        preview.innerHTML = `<p class="text-zinc-500 text-center py-8">No photos uploaded yet</p>`;
      }

      document.getElementById('edit-modal').classList.remove('hidden');
    };

    function showFullSizePhoto(url) {
      const viewer = document.createElement('div');
      viewer.className = "fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-4";
      viewer.innerHTML = `
        <div class="relative max-w-5xl w-full">
          <button onclick="this.parentElement.parentElement.remove()" class="absolute -top-12 right-0 text-white text-4xl hover:text-red-400">×</button>
          <img src="${url}" class="max-h-[90vh] mx-auto rounded-2xl">
        </div>`;
      document.body.appendChild(viewer);
      viewer.addEventListener('click', e => { if (e.target === viewer) viewer.remove(); });
    }

    // Photo upload
    document.getElementById('photo-upload').addEventListener('change', (e) => {
      const files = Array.from(e.target.files);
      const preview = document.getElementById('photo-preview');
      files.forEach(file => {
        uploadedFiles.push(file);
        const reader = new FileReader();
        reader.onload = ev => {
          const div = document.createElement('div');
          div.className = "relative rounded-2xl overflow-hidden";
          div.innerHTML = `
            <img src="${ev.target.result}" class="w-full h-32 object-cover">
            <button class="absolute top-2 right-2 bg-red-600 text-white w-6 h-6 rounded-full text-xs">×</button>
          `;
          div.querySelector('button').onclick = () => {
            uploadedFiles = uploadedFiles.filter(f => f !== file);
            div.remove();
          };
          preview.appendChild(div);
        };
        reader.readAsDataURL(file);
      });
    });

    // Save
    document.getElementById('save-edit-btn').addEventListener('click', async () => {
      const customer_name = document.getElementById('edit_customer_name').value.trim();
      const status = document.getElementById('edit_status').value;
      const total_cost = parseFloat(document.getElementById('edit_total_cost').value) || 0;
      const notes = document.getElementById('edit_notes').value.trim();

      let scheduled_date = null;
      if (status === 'in_progress') {
        const val = document.getElementById('edit_scheduled_date').value;
        if (val) scheduled_date = new Date(val).toISOString();
      }

      try {
        const { error } = await supabaseClient
          .from('job_calculations')
          .update({ customer_name, status, total_cost, notes, scheduled_date })
          .eq('id', currentEditingJobId);

        if (error) throw error;

        if (uploadedFiles.length > 0) {
          for (let file of uploadedFiles) {
            const fileName = `${currentEditingJobId}/${Date.now()}-${Math.random().toString(36).slice(2)}.${file.name.split('.').pop()}`;
            await supabaseClient.storage.from('job-photos').upload(fileName, file);
          }
        }

        document.getElementById('edit-modal').classList.add('hidden');
        uploadedFiles = [];
        loadSchedule();
        alert("Job updated successfully!");
      } catch (err) {
        alert("Failed to save changes");
      }
    });

    // Cancel
    document.getElementById('cancel-edit-btn').addEventListener('click', () => {
      document.getElementById('edit-modal').classList.add('hidden');
      uploadedFiles = [];
      document.getElementById('photo-preview').innerHTML = '';
      document.getElementById('photo-upload').value = '';
    });

    // Logout
    const handleLogout = async () => {
      await supabaseClient.auth.signOut({ scope: 'local' });
      window.location.replace('staff-login.html');
    };

    document.getElementById('logout-btn').addEventListener('click', handleLogout);
    document.getElementById('mobile-logout-btn').addEventListener('click', handleLogout);

    async function init() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) return window.location.replace('staff-login.html');
      loadSchedule();
    }

    init();
  </script>
</body>
</html>
