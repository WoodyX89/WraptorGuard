<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing Settings - WraptorGuard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    .logo-green { color: #00A651; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <!-- Navbar -->
  <nav class="bg-black border-b border-green-600 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4">
      <div class="flex items-center justify-between">
        <!-- Logo -->
        <div class="flex items-center gap-3">
          <img src="images/logo2.png" alt="WraptorGuard Logo" class="h-16 w-auto md:h-24">
          <div>
            <span class="text-2xl md:text-3xl font-black tracking-tighter logo-green">WRAPTOR</span>
            <span class="text-2xl md:text-3xl font-black tracking-tighter">GUARD</span>
          </div>
        </div>

        <!-- Desktop Menu -->
        <div class="hidden md:flex gap-8 text-lg">
          <a href="staff-dashboard.html" class="hover:text-green-400 transition">Dashboard</a>
          <a href="job-calculator.html" class="hover:text-green-400 transition">Calculator</a>
          <a href="saved-quotes.html" class="hover:text-green-400 transition">Estimates</a>
          <a href="job-schedule.html" class="hover:text-green-400 transition">Calendar</a>
          <a href="pricing-settings.html" class="hover:text-green-400 transition">Pricing</a>
        </div>

        <!-- Desktop Logout -->
        <button id="logout-btn" class="hidden md:block bg-red-600 hover:bg-red-500 px-6 py-3 rounded-2xl font-semibold transition">
          Logout
        </button>

        <!-- Mobile Hamburger -->
        <button id="mobile-menu-button" class="md:hidden hamburger flex flex-col justify-center gap-1.5 w-10 h-10">
          <span class="block h-0.5 w-8 bg-white"></span>
          <span class="block h-0.5 w-8 bg-white"></span>
          <span class="block h-0.5 w-8 bg-white"></span>
          <span class="block h-0.5 w-8 bg-white"></span>

        </button>
      </div>

      <!-- Mobile Menu -->
      <div id="mobile-menu" class="hidden md:hidden mt-4 py-6 border-t border-green-900">
        <div class="flex flex-col gap-6 text-xl">
          <a href="staff-dashboard.html" class="hover:text-green-400 transition py-2">Dashboard</a>
          <a href="job-calculator.html" class="hover:text-green-400 transition py-2">Job Calculator</a>
          <a href="saved-quotes.html" class="hover:text-green-400 transition py-2">Estimates</a>
          <a href="job-schedule.html" class="hover:text-green-400 transition py-2">Calendar</a>
          <a href="pricing-settings.html" class="hover:text-green-400 transition py-2">Pricing</a>
          <button id="mobile-logout-btn" 
                  class="mt-6 bg-red-600 hover:bg-red-500 py-4 rounded-2xl font-semibold text-center">
            Logout
          </button>
        </div>
      </div>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto px-4 sm:px-6 py-12">
    <h1 class="text-4xl font-bold mb-8">Pricing Settings</h1>
    <p class="text-zinc-400 mb-10">Update prices for each equipment type</p>

    <div id="pricing-form" class="space-y-10"></div>

    <button id="save-prices-btn" 
            class="mt-12 w-full bg-green-600 hover:bg-green-500 text-black font-bold py-6 rounded-3xl text-xl">
      Save All Price Changes
    </button>
  </div>

  <script>
    const supabaseClient = supabase.createClient(
      'https://jxnvndwfvphipttjbggk.supabase.co',
      'sb_publishable_3jrvCcwVtu0aAlXuOBZDLQ_3Dr4eUs4'
    );

    const types = ['boat', 'rv', 'heavy', 'patio', 'freight', 'custom'];
    const displayNames = {
      boat: "Boat & Marine",
      rv: "RV / Camper / Trailer",
      heavy: "Heavy Equipment & Machinery",
      patio: "Patio Furniture Set",
      freight: "Freight & Transport",
      custom: "Custom Project"
    };

    async function loadPricing() {
      const { data } = await supabaseClient.from('pricing_settings').select('*');
      const form = document.getElementById('pricing-form');

      form.innerHTML = types.map(type => {
        const price = (data || []).find(p => p.equipment_type === type) || 
                     { price_per_sqft: 0.45, vent_price: 15, extra_fee: 65 };

        return `
          <div class="bg-zinc-900 rounded-3xl p-8">
            <h3 class="text-2xl font-bold mb-6">${displayNames[type]}</h3>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
              <div>
                <label class="block text-sm text-zinc-400 mb-2">Price per sq ft ($)</label>
                <input type="number" step="0.01" value="${price.price_per_sqft}" 
                       data-type="${type}" data-field="price_per_sqft"
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4">
              </div>
              <div>
                <label class="block text-sm text-zinc-400 mb-2">Vent Price ($)</label>
                <input type="number" step="0.01" value="${price.vent_price}" 
                       data-type="${type}" data-field="vent_price"
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4">
              </div>
              <div>
                <label class="block text-sm text-zinc-400 mb-2">Extra Fee ($)</label>
                <input type="number" step="0.01" value="${price.extra_fee}" 
                       data-type="${type}" data-field="extra_fee"
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4">
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    document.getElementById('save-prices-btn').addEventListener('click', async () => {
      const btn = document.getElementById('save-prices-btn');
      btn.disabled = true;
      btn.textContent = "Saving prices...";

      const inputs = document.querySelectorAll('#pricing-form input');
      let successCount = 0;

      try {
        for (let input of inputs) {
          const type = input.dataset.type;
          const field = input.dataset.field;
          const value = parseFloat(input.value) || 0;

          const { error } = await supabaseClient
            .from('pricing_settings')
            .upsert({ 
              equipment_type: type, 
              [field]: value 
            }, { onConflict: 'equipment_type' });

          if (error) throw error;
          successCount++;
        }

        alert(`✅ Successfully updated ${successCount} price fields!`);
        await loadPricing(); // Refresh the form
      } catch (err) {
        console.error(err);
        alert("Error saving prices: " + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "Save All Price Changes";
      }
    });
    // Mobile Menu
    const menuButton = document.getElementById('mobile-menu-button');
    const mobileMenu = document.getElementById('mobile-menu');

    if (menuButton && mobileMenu) {
        menuButton.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
        menuButton.classList.toggle('active');
        });

        document.querySelectorAll('#mobile-menu a').forEach(link => {
        link.addEventListener('click', () => {
            mobileMenu.classList.add('hidden');
            menuButton.classList.remove('active');
        });
        });
    }

    // Elements
    const saveBtn = document.getElementById('save-job-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const mobileLogoutBtn = document.getElementById('mobile-logout-btn');
    // Logout
    const handleLogout = async () => {
        await supabaseClient.auth.signOut({ scope: 'local' });
        window.location.replace('staff-login.html');
    };

    if (logoutBtn) logoutBtn.addEventListener('click', handleLogout);
    if (mobileLogoutBtn) mobileLogoutBtn.addEventListener('click', handleLogout);

    // Protect page + load
    async function init() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) return window.location.replace('staff-login.html');

      await loadPricing();
    }

    init();
  </script>
</body>
</html>
