<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login - WraptorGuard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    body {
      font-family: system-ui, sans-serif;
    }
    .logo-green {
      color: #00A651;
    }
    .hero-bg {
      background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                  url('https://picsum.photos/id/1015/2000/1200');
      background-size: cover;
      background-position: center;
    }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <!-- Navbar (simplified) -->
  <nav class="bg-black border-b border-green-600 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="images/logo2.png" alt="WraptorGuard Logo" class="h-12 w-auto">
        <div>
          <span class="text-2xl font-black tracking-tighter logo-green">WRAPTOR</span>
          <span class="text-2xl font-black tracking-tighter">GUARD</span>
        </div>
      </div>
      <a href="index.html" class="text-green-400 hover:text-green-300 text-sm font-medium">← Back to Website</a>
    </div>
  </nav>

  <div class="hero-bg min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-auto px-6">
      <div class="bg-zinc-900/95 backdrop-blur-xl border border-green-600/30 rounded-3xl p-10 shadow-2xl">
        
        <div class="text-center mb-10">
          <h1 class="text-4xl font-black tracking-tighter mb-2">
            Staff <span class="logo-green">Portal</span>
          </h1>
          <p class="text-zinc-400">Sign in to access the WraptorGuard dashboard</p>
        </div>

        <form id="login-form" class="space-y-6">
          <div>
            <label class="block text-sm text-zinc-400 mb-2">Email</label>
            <input 
              id="email"
              type="email" 
              required
              class="w-full bg-zinc-800 border border-zinc-700 focus:border-green-500 rounded-2xl px-6 py-4 text-white placeholder-zinc-500 focus:outline-none">
          </div>

          <div>
            <label class="block text-sm text-zinc-400 mb-2">Password</label>
            <input 
              id="password"
              type="password" 
              required
              class="w-full bg-zinc-800 border border-zinc-700 focus:border-green-500 rounded-2xl px-6 py-4 text-white placeholder-zinc-500 focus:outline-none">
          </div>

          <div id="error-message" class="text-red-400 text-sm min-h-[1.25rem]"></div>

          <button 
            type="submit"
            id="login-button"
            class="w-full bg-green-600 hover:bg-green-500 text-black font-bold text-xl py-5 rounded-2xl transition-all duration-200">
            SIGN IN
          </button>
        </form>

        <p class="text-center text-xs text-zinc-500 mt-8">
          Medicine Hat • Secure Staff Access Only
        </p>
      </div>
    </div>
  </div>

<script>
  // === YOUR SUPABASE CONFIG ===
  const supabaseUrl = 'https://jxnvndwfvphipttjbggk.supabase.co';
  const supabaseAnonKey = 'sb_publishable_3jrvCcwVtu0aAlXuOBZDLQ_3Dr4eUs4';

  // FIXED: Use lowercase 'supabase' (the CDN exposes it as window.supabase)
  const supabaseClient = supabase.createClient(supabaseUrl, supabaseAnonKey);

  const form = document.getElementById('login-form');
  const errorMsg = document.getElementById('error-message');
  const loginBtn = document.getElementById('login-button');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    errorMsg.textContent = '';
    loginBtn.disabled = true;
    loginBtn.textContent = 'SIGNING IN...';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      console.log('🔄 Attempting login with email:', email);

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
      });

      console.log('Supabase response →', { data, error });

      if (error) throw error;

      console.log('✅ Login successful! Redirecting...');
      window.location.href = 'staff-dashboard.html';

    } catch (err) {
      console.error('❌ Login failed:', err);
      errorMsg.textContent = err.message || 'Invalid email or password. Please try again.';
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = 'SIGN IN';
    }
  });
</script>
</body>
</html>
